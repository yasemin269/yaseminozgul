<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Yasemin'in Mağazası</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>

    <header>
        <div class="container navbar">
            <div class="logo">
                <a href="../index.html">Yasemin'in Mağazası.</a>
            </div>
            
            <nav>
                <ul class="nav-links">
                    <li><a href="../index.html">Ana Sayfa</a></li>
                    <li><a href="urunler.html">Ürünler</a></li>
                    <li><a href="iletisim.html" class="active">İletişim</a></li>
                </ul>
            </nav>
            
            <div class="cart-icon">
                <a href="sepet.html">🛒 Sepet <span id="cart-count">0</span></a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <h1 class="section-title">Bizimle İletişime Geçin</h1>
            
            <div class="contact-wrapper">
                <!-- Form gönderildiğinde myscript.js içindeki validateForm fonksiyonu çalışacak -->
                <form id="contact-form">
                    
                    <div class="form-group">
                        <label for="name">Adınız Soyadınız *</label>
                        <!-- 'required' niteliği ile HTML5 doğrulamasını da ekleyebiliriz ama JS ile de kontrol ediyoruz -->
                        <input type="text" id="name" name="name" placeholder="Adınızı giriniz">
                    </div>

                    <div class="form-group">
                        <label for="email">E-posta Adresiniz *</label>
                        <input type="email" id="email" name="email" placeholder="ornek@email.com">
                    </div>

                    <div class="form-group">
                        <label for="message">Mesajınız</label>
                        <textarea id="message" name="message" placeholder="Bize ne söylemek istersiniz?"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-submit">Gönder</button>
                    
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">Yasemin'in Mağazası.</div>
                <div class="footer-links">
                    <a href="#">Hakkımızda</a>
                    <a href="#">Gizlilik Politikası</a>
                    <a href="#">Şartlar</a>
                </div>
            </div>
            <div class="footer-bottom">
                &copy; 2026 Yasemin'in Mağazası. Web Tasarımı ve İnternet Programlama Dersi Ödevi.
            </div>
        </div>
    </footer>

    <!-- JS dosyasının yolu -->
    <script src="../scripts/myscript.js"></script>
</body>
</html>
